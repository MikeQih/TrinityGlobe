<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock — 5 Cases Hover</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080808;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 3rem;
      padding: 3rem 2rem;
      font-family: 'Inter', sans-serif;
      flex-wrap: wrap;
    }
    .card {
      background: #111;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 12px;
      overflow: hidden;
      width: 300px;
    }
    .card-img {
      background: #1a1a1a;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }
    .card-body { padding: 1.1rem 1.2rem 1.3rem; }
    .card-category {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: #c9a84c;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }
    .card-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #f0ead8;
      margin-bottom: 0.8rem;
    }
    .price-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.2rem;
      margin-top: 0.9rem;
      padding-top: 0.9rem;
      border-top: 1px solid rgba(201,168,76,0.2);
    }
    .price-item { display: flex; flex-direction: column; gap: 0.25rem; }
    .price-label {
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9a9080;
      white-space: nowrap;
    }
    .price-value {
      font-size: 0.88rem;
      color: #c9a84c;
      font-weight: 500;
    }
    .price-item.selected {
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.45);
      border-radius: 6px;
      padding: 0.4rem 0.5rem;
      margin: -0.4rem -0.5rem;
    }

    /* ── Enquire button ── */
    .enquire-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      margin-top: 2px;
      color: #9a9080;
      transition: color 0.2s;
    }

    /* default: phone icon visible, text hidden */
    .enquire-link .icon-phone { display: block; transition: opacity 0.2s; }
    .enquire-link .icon-phone svg { width: 18px; height: 18px; }

    .enquire-link .hover-text {
      display: none;
      flex-direction: column;
      gap: 1px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .enquire-link .hover-text .enquire-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c9a84c;
      line-height: 1;
    }
    .enquire-link .hover-text .enquire-sub {
      font-size: 0.65rem;
      letter-spacing: 0.04em;
      color: #f0ead8;
      line-height: 1.2;
    }

    /* hover state */
    .enquire-link:hover .icon-phone { display: none; }
    .enquire-link:hover .hover-text {
      display: flex;
      opacity: 1;
    }

    .label {
      color: #9a9080;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-align: center;
      margin-bottom: 0.6rem;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Default: phone icon -->
  <div>
    <p class="label">默认状态</p>
    <div class="card">
      <div class="card-img">[ Product Image ]</div>
      <div class="card-body">
        <div class="card-category">Cognac</div>
        <div class="card-name">Hennessy VSOP</div>
        <div class="price-grid">
          <div class="price-item">
            <span class="price-label">1 Bottle</span>
            <span class="price-value">S$85</span>
          </div>
          <div class="price-item">
            <span class="price-label">1 Case</span>
            <span class="price-value">S$80</span>
          </div>
          <div class="price-item selected">
            <span class="price-label">5 Cases</span>
            <!-- 这个卡片固定显示默认态，不响应 hover -->
            <span style="display:inline-flex;align-items:center;color:#9a9080;margin-top:2px;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 011 1V20a1 1 0 01-1 1C10.01 21 3 13.99 3 5a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.57a1 1 0 01-.25 1.01l-2.2 2.21z"/>
              </svg>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Hover: Enquire / WhatsApp → -->
  <div>
    <p class="label">Hover 状态</p>
    <div class="card">
      <div class="card-img">[ Product Image ]</div>
      <div class="card-body">
        <div class="card-category">Cognac</div>
        <div class="card-name">Hennessy VSOP</div>
        <div class="price-grid">
          <div class="price-item">
            <span class="price-label">1 Bottle</span>
            <span class="price-value">S$85</span>
          </div>
          <div class="price-item">
            <span class="price-label">1 Case</span>
            <span class="price-value">S$80</span>
          </div>
          <div class="price-item selected">
            <span class="price-label">5 Cases</span>
            <!-- 固定显示 hover 态 -->
            <div style="display:flex;flex-direction:column;gap:1px;margin-top:2px;">
              <span style="font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#c9a84c;line-height:1;">ENQUIRE</span>
              <span style="font-size:0.65rem;letter-spacing:0.04em;color:#f0ead8;line-height:1.2;">WhatsApp &#x2192;</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Interactive: 真实交互效果（鼠标悬停试试） -->
  <div>
    <p class="label">真实交互（hover 试试）</p>
    <div class="card">
      <div class="card-img">[ Product Image ]</div>
      <div class="card-body">
        <div class="card-category">Cognac</div>
        <div class="card-name">Hennessy VSOP</div>
        <div class="price-grid">
          <div class="price-item">
            <span class="price-label">1 Bottle</span>
            <span class="price-value">S$85</span>
          </div>
          <div class="price-item">
            <span class="price-label">1 Case</span>
            <span class="price-value">S$80</span>
          </div>
          <div class="price-item selected">
            <span class="price-label">5 Cases</span>
            <a class="enquire-link" href="https://wa.me/6598680555" target="_blank">
              <span class="icon-phone">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 011 1V20a1 1 0 01-1 1C10.01 21 3 13.99 3 5a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.57a1 1 0 01-.25 1.01l-2.2 2.21z"/>
                </svg>
              </span>
              <span class="hover-text">
                <span class="enquire-label">Enquire</span>
                <span class="enquire-sub">WhatsApp &#x2192;</span>
              </span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
